database:
  host: localhost
  port: 5432
  name: sales_dw
  user: airflow
  password: airflow

pipeline:
  data_dir: /opt/airflow/data
  source_file: superstore.csv
  log_dir: /opt/airflow/logs
  reports_dir: /opt/airflow/reports

quality:
  max_null_pct: 0.05
  min_row_count: 1

airflow:
  dag_id: sales_pipeline
  schedule: "@daily"
  retries: 2
  retry_delay_minutes: 5
