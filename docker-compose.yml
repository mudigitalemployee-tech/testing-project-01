version: "3.8"

# ─────────────────────────────────────────────────────────────
# Batch Sales Analytics Pipeline
# Services: PostgreSQL 15 + Apache Airflow 2.8.1
# Usage: docker-compose up -d
# Airflow UI: http://localhost:8080 (admin/admin)
# ─────────────────────────────────────────────────────────────

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/sales_dw
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__WEBSERVER__SECRET_KEY: "sales-pipeline-secret"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scripts:/opt/airflow/scripts
    - ./utils:/opt/airflow/utils
    - ./sql:/opt/airflow/sql
    - ./config:/opt/airflow/config
    - ./data:/opt/airflow/data
    - ./logs:/opt/airflow/logs
    - ./reports:/opt/airflow/reports
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: sales_dw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5

  airflow-init:
    <<: *airflow-common
    entrypoint: >
      bash -c "
        pip install psycopg2-binary pyyaml pandas matplotlib -q &&
        airflow db init &&
        airflow users create --username admin --password admin
          --firstname Admin --lastname User --role Admin --email admin@example.com
      "
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    ports:
      - "8080:8080"
    command: webserver
    restart: always
    depends_on:
      - airflow-init

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      - airflow-init

volumes:
  postgres_data:
